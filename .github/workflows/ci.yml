name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=cover.out ./...

      - name: Coverage report
        run: |
          # Full per-function breakdown in the job log.
          go tool cover -func=cover.out
          # Per-package + total summary on the run page.
          {
            echo "### Coverage"
            echo ''
            echo '```'
            go test -cover ./... 2>/dev/null
            echo ''
            go tool cover -func=cover.out | tail -1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce coverage threshold
        run: |
          threshold=99
          total=$(go tool cover -func=cover.out | tail -1 | grep -oE '[0-9]+(\.[0-9]+)?' | tail -1)
          echo "Total coverage: ${total}% (minimum ${threshold}%)"
          if awk -v t="$threshold" -v c="$total" 'BEGIN { exit !(c + 0 >= t + 0) }'; then
            echo "Coverage OK"
          else
            echo "::error::Total coverage ${total}% is below the ${threshold}% threshold"
            exit 1
          fi

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile
          path: cover.out
          if-no-files-found: error
